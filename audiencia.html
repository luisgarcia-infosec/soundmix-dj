<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMix - Chat en Vivo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary-dark: #0a0e27;
            --secondary-dark: #141b2f;
            --accent-blue: #00d4ff;
            --accent-purple: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #a8b3d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, var(--primary-dark) 0%, #0d1424 100%); 
            color: var(--text-primary); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }

        /* FONDO ANIMADO */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .dancing-silhouette {
            position: absolute;
            bottom: 0;
            font-size: 80px;
            opacity: 0.08;
            animation: dance 3s ease-in-out infinite;
        }

        .sil1 { left: 5%; animation-delay: 0s; }
        .sil2 { left: 15%; animation-delay: 0.5s; }
        .sil3 { left: 25%; animation-delay: 1s; }
        .sil4 { left: 35%; animation-delay: 1.5s; }
        .sil5 { left: 45%; animation-delay: 0.3s; }
        .sil6 { left: 55%; animation-delay: 0.8s; }
        .sil7 { left: 65%; animation-delay: 1.2s; }
        .sil8 { left: 75%; animation-delay: 1.7s; }
        .sil9 { left: 85%; animation-delay: 0.2s; }
        .sil10 { left: 95%; animation-delay: 1.1s; }

        @keyframes dance {
            0%, 100% { transform: translateY(0) scaleX(1); }
            25% { transform: translateY(-20px) scaleX(1.05); }
            50% { transform: translateY(-40px) scaleX(1); }
            75% { transform: translateY(-20px) scaleX(0.95); }
        }

        .hidden { display: none !important; }

        #welcome { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(135deg, var(--primary-dark) 0%, #0d1424 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }

        .welcome-box { 
            background: linear-gradient(135deg, var(--secondary-dark) 0%, rgba(20, 27, 47, 0.8) 100%); 
            border: 2px solid rgba(0, 212, 255, 0.5); 
            border-radius: 20px; 
            padding: 3rem 2rem; 
            max-width: 500px; 
            text-align: center; 
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3); 
        }

        .welcome-icon { 
            font-size: 4rem; 
            color: var(--accent-blue); 
            margin-bottom: 1.5rem; 
        }

        .welcome-title { 
            font-size: 2.5rem; 
            font-weight: 700; 
            margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 2px; 
        }

        .welcome-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .welcome-subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1rem; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { color: var(--accent-blue); font-weight: 600; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 0.5rem; display: block; }
        .form-group input { 
            width: 100%; 
            padding: 0.9rem; 
            background: rgba(0, 212, 255, 0.05); 
            border: 2px solid rgba(0, 212, 255, 0.3); 
            border-radius: 8px; 
            color: var(--text-primary); 
            font-size: 1rem; 
        }

        .welcome-btn { 
            width: 100%; 
            padding: 1rem; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); 
            border: none; 
            border-radius: 8px; 
            color: #000; 
            font-weight: 700; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        #app { 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            position: relative; 
            z-index: 10; 
        }

        .header { 
            background: linear-gradient(180deg, rgba(20, 27, 47, 0.95) 0%, rgba(10, 14, 39, 0.85) 100%); 
            border-bottom: 2px solid rgba(0, 212, 255, 0.3); 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(10px);
        }

        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo i { font-size: 2rem; color: var(--accent-blue); }
        .logo h1 { 
            font-size: 1.8rem; 
            font-weight: 700; 
            letter-spacing: 2px; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .status {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .content { 
            flex: 1; 
            padding: 2rem; 
            max-width: 600px; 
            margin: 0 auto; 
            width: 100%; 
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 1rem;
        }

        .engagement-section {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .like-section {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .like-btn {
            background: linear-gradient(135deg, #ec4899, #be185d);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .like-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.6);
        }

        .like-btn.liked {
            background: linear-gradient(135deg, #ff1493, #c71585);
        }

        .like-count {
            color: var(--text-secondary);
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .comments-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 1rem;
            min-height: 400px;
        }

        .comments-title {
            color: var(--accent-blue);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 0.8rem;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-right: 0.5rem;
        }

        .comment-item {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 8px;
            padding: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-author {
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }

        .comment-text {
            color: var(--text-secondary);
            word-break: break-word;
            line-height: 1.4;
        }

        .comment-time {
            color: rgba(168, 179, 209, 0.5);
            font-size: 0.75rem;
            margin-top: 0.4rem;
        }

        .comment-input-section {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
        }

        .input-group input {
            padding: 0.8rem;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 0.9rem;
        }

        .input-group input::placeholder {
            color: rgba(168, 179, 209, 0.5);
        }

        .comment-submit {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .comment-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .comment-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message { 
            padding: 1rem; 
            border-radius: 8px; 
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .message.show { display: block; }

        .success-msg { 
            background: rgba(16, 185, 129, 0.2); 
            border: 1px solid #10b981;
            color: #10b981; 
        }

        .error-msg { 
            background: rgba(255, 0, 110, 0.2); 
            border: 1px solid #ff006e;
            color: #ff006e; 
        }

        /* Scrollbar personalizado */
        .comments-list::-webkit-scrollbar {
            width: 6px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.05);
            border-radius: 10px;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 10px;
        }

        .comments-list::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }

        @media (max-width: 600px) {
            .content {
                padding: 1rem;
            }

            .engagement-section {
                padding: 1rem;
            }

            .comment-item {
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- FONDO ANIMADO -->
    <div class="background-animation">
        <div class="dancing-silhouette sil1"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil2"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil3"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil4"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil5"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil6"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil7"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil8"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil9"><i class="fas fa-person"></i></div>
        <div class="dancing-silhouette sil10"><i class="fas fa-person"></i></div>
    </div>

    <div id="welcome">
        <div class="welcome-box">
            <div class="welcome-icon"><i class="fas fa-comments"></i></div>
            <h1 class="welcome-title">SOUNDMIX</h1>
            <div class="welcome-badge">💬 CHAT EN VIVO</div>
            <p class="welcome-subtitle">Conecta con el DJ</p>
            
            <div class="form-group">
                <label>Tu nombre</label>
                <input type="text" id="userInput" placeholder="Ej: Tu nombre" maxlength="20" />
            </div>
            <button class="welcome-btn" onclick="enterApp()">
                <i class="fas fa-arrow-right"></i> Entrar al Chat
            </button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="header">
            <div class="logo">
                <i class="fas fa-comments"></i>
                <h1>SOUNDMIX</h1>
            </div>
            <div class="status">
                <i class="fas fa-circle" style="font-size: 0.6rem;"></i>
                EN VIVO
            </div>
        </header>

        <div class="content">
            <div id="successMsg" class="message success-msg"></div>
            <div id="errorMsg" class="message error-msg"></div>

            <div class="chat-container">
                <div class="engagement-section">
                    <div class="like-section">
                        <button class="like-btn" id="likeBtn" onclick="toggleLike()">
                            <i class="fas fa-heart"></i>
                            <span id="likeText">Me Gusta</span>
                        </button>
                        <div class="like-count">
                            👍 <span id="likeCount">0</span> personas les gusta
                        </div>
                    </div>

                    <div class="comments-section">
                        <div class="comments-title"><i class="fas fa-comments"></i> Chat en Vivo</div>
                        <div class="comments-list" id="commentsList">
                            <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
                                <i class="fas fa-comments" style="font-size: 2rem; opacity: 0.3; margin-bottom: 1rem; display: block;"></i>
                                Esperando comentarios...
                            </div>
                        </div>

                        <div class="comment-input-section">
                            <div class="input-group">
                                <input type="text" id="commentInput" placeholder="Escribe un comentario..." maxlength="150" />
                                <button class="comment-submit" onclick="sendComment()">
                                    <i class="fas fa-paper-plane"></i> Enviar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG - IGUAL QUE EN DJ
        // ============================================
        const firebaseConfig = {
          apiKey: "AIzaSyC2uiaZNfglQKKGUs3xCmizc_-m77hzDcM",
          authDomain: "soundmix-dj-c1c30.firebaseapp.com",
          projectId: "soundmix-dj-c1c30",
          databaseURL: "https://soundmix-dj-c1c30-default-rtdb.firebaseio.com",
          storageBucket: "soundmix-dj-c1c30.firebasestorage.app",
          messagingSenderId: "1027127283256",
          appId: "1:1027127283256:web:aa3b139af18d05fa12e0cd"
        };

        let realtimeDB = null;
        let currentDjId = null;
        let userName = null;
        let liked = false;
        let likeCount = 0;
        let comments = [];

        try {
            if (typeof firebase !== 'undefined') {
                const app = firebase.initializeApp(firebaseConfig);
                realtimeDB = firebase.database(app);
                console.log('✓ Firebase CONECTADO en Audiencia');
            } else {
                console.error('❌ Firebase SDK no disponible');
                setTimeout(() => {
                    if (typeof firebase !== 'undefined') {
                        const app = firebase.initializeApp(firebaseConfig);
                        realtimeDB = firebase.database(app);
                        console.log('✓ Firebase CONECTADO en Audiencia (retry)');
                    }
                }, 500);
            }
        } catch (error) {
            console.warn('⚠ Error Firebase:', error);
        }

        // ============================================
        // OBTENER DJ ID DE URL
        // ============================================
        function getDjIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('dj');
        }

        // ============================================
        // AUTENTICACIÓN
        // ============================================
        function enterApp() {
            const input = document.getElementById('userInput');
            const name = input.value.trim();
            
            if (!name) {
                alert('Por favor ingresa tu nombre');
                return;
            }

            currentDjId = getDjIdFromUrl();
            if (!currentDjId) {
                alert('URL inválida. Necesitas el link correcto del DJ');
                return;
            }
            
            userName = name;
            localStorage.setItem('soundmix_audiencia_user', name);
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            init();
        }

        // ============================================
        // MENSAJES
        // ============================================
        function showMessage(type, text) {
            const el = document.getElementById(`${type}Msg`);
            if (el) {
                el.textContent = text;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 4000);
            }
        }

        // ============================================
        // LIKES EN TIEMPO REAL
        // ============================================
        function toggleLike() {
            liked = !liked;
            const btn = document.getElementById('likeBtn');
            
            if (liked) {
                btn.classList.add('liked');
                likeCount++;
            } else {
                btn.classList.remove('liked');
                likeCount--;
            }
            
            document.getElementById('likeCount').textContent = likeCount;

            if (realtimeDB && currentDjId) {
                realtimeDB.ref(`sessions/${currentDjId}/likes`).set(likeCount);
            }
        }

        // ============================================
        // COMENTARIOS EN TIEMPO REAL
        // ============================================
        function listenToComments() {
            if (!realtimeDB || !currentDjId) return;

            const commentsRef = realtimeDB.ref(`sessions/${currentDjId}/comments`);
            commentsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                comments = data ? Object.values(data) : [];
                updateCommentsUI();
                scrollToBottom();
            });

            // ✅ ESCUCHAR LIKES EN TIEMPO REAL
            const likesRef = realtimeDB.ref(`sessions/${currentDjId}/likes`);
            likesRef.on('value', (snapshot) => {
                const data = snapshot.val();
                likeCount = data || 0;
                document.getElementById('likeCount').textContent = likeCount;
                console.log('✓ Likes actualizados:', likeCount);
            });
        }

        function sendComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();

            if (!text) {
                showMessage('error', '❌ Escribe algo');
                return;
            }

            const comment = {
                id: Date.now(),
                name: userName,
                text: text,
                timestamp: new Date().toLocaleTimeString()
            };

            if (realtimeDB && currentDjId) {
                realtimeDB.ref(`sessions/${currentDjId}/comments/${comment.id}`).set(comment);
                input.value = '';
                showMessage('success', '✓ Enviado');
            } else {
                comments.push(comment);
                updateCommentsUI();
                input.value = '';
            }
        }

        function updateCommentsUI() {
            const list = document.getElementById('commentsList');
            
            if (comments.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 2rem;"><i class="fas fa-comments" style="font-size: 2rem; opacity: 0.3; margin-bottom: 1rem; display: block;"></i>Esperando comentarios...</div>';
                return;
            }

            list.innerHTML = '';
            comments.slice().reverse().forEach(comment => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-author">👤 ${comment.name}</div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-time">${comment.timestamp}</div>
                `;
                list.appendChild(div);
            });
        }

        function scrollToBottom() {
            const list = document.getElementById('commentsList');
            setTimeout(() => {
                list.scrollTop = list.scrollHeight;
            }, 50);
        }

        // ============================================
        // ENTER PARA ENVIAR COMENTARIO
        // ============================================
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('commentInput') === document.activeElement) {
                sendComment();
            }
        });

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        function init() {
            listenToComments();
            console.log('✓ Chat listo!');
        }

        // ============================================
        // CARGA
        // ============================================
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('soundmix_audiencia_user');
            
            if (savedUser) {
                currentDjId = getDjIdFromUrl();
                if (currentDjId) {
                    userName = savedUser;
                    document.getElementById('welcome').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    init();
                }
            }
        });
    </script>
</body>
</html>
